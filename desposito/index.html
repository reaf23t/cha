<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirserve - Repositório de Arquivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header Simplificado -->
        <header class="mb-12 border-b border-slate-800 pb-8">
            <h1 class="text-3xl font-bold mb-2">Nirserve</h1>
            <p class="text-slate-400">Sistema de armazenamento organizado por categorias.</p>
        </header>

        <!-- Área de Upload (Requisito Principal) -->
        <section class="bg-slate-800 rounded-3xl p-8 mb-12 border border-slate-700">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt text-blue-500"></i>
                Enviar Novos Documentos
            </h2>
            <form id="upload-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <input type="file" id="file-input" multiple class="block w-full text-sm text-slate-400
                        file:mr-4 file:py-3 file:px-6
                        file:rounded-xl file:border-0
                        file:text-sm file:font-semibold
                        file:bg-blue-600 file:text-white
                        hover:file:bg-blue-700 transition-all cursor-pointer">
                </div>
                <div class="flex gap-2">
                    <select id="file-category" class="bg-slate-700 border border-slate-600 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none flex-grow">
                        <option value="arduino">Arduino / 3D</option>
                        <option value="lego">Lego / Spike</option>
                    </select>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2 rounded-xl transition-all">
                        Salvar
                    </button>
                </div>
            </form>
        </section>

        <!-- Repositório Organizado por Pastas -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Pasta Designada: Arduino -->
            <section class="bg-slate-800/50 rounded-3xl border border-slate-700 p-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-blue-500/10 p-3 rounded-2xl text-blue-400">
                        <i class="fas fa-folder-open text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Pasta: Arduino</h2>
                        <p class="text-slate-500 text-xs uppercase tracking-widest font-bold">Programações e Modelos 3D</p>
                    </div>
                </div>
                <div id="arduino-folder" class="space-y-3">
                    <!-- Arquivos Arduino aparecerão aqui -->
                    <p class="text-slate-600 italic text-sm py-4 text-center">Nenhum arquivo nesta pasta.</p>
                </div>
            </section>

            <!-- Pasta Designada: Lego -->
            <section class="bg-slate-800/50 rounded-3xl border border-slate-700 p-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-emerald-500/10 p-3 rounded-2xl text-emerald-400">
                        <i class="fas fa-folder-open text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">Pasta: Lego</h2>
                        <p class="text-slate-500 text-xs uppercase tracking-widest font-bold">EV3 e Spike Prime</p>
                    </div>
                </div>
                <div id="lego-folder" class="space-y-3">
                    <!-- Arquivos Lego aparecerão aqui -->
                    <p class="text-slate-600 italic text-sm py-4 text-center">Nenhum arquivo nesta pasta.</p>
                </div>
            </section>

        </div>
    </div>

    <!-- Feedback de Sucesso -->
    <div id="toast" class="fixed bottom-8 right-8 bg-emerald-600 text-white px-6 py-4 rounded-2xl shadow-2xl translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Arquivo salvo na pasta designada!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
